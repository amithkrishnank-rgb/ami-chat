<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Space</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --surface2: #221f1a;
    --border: #2e2a24;
    --gold: #c9a96e;
    --gold-dim: #7a6240;
    --text: #e8e0d0;
    --text-dim: #7a7060;
    --ami: #c9a96e;
    --her: #a0b8a0;
    --bubble-ami: #2a2318;
    --bubble-her: #1a2318;
    --radius: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* LOGIN */
  #login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    animation: fadeIn 0.6s ease;
  }

  .login-glow {
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(201,169,110,0.07) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
  }

  .login-title {
    font-family: 'Lora', serif;
    font-size: 2.2rem;
    color: var(--gold);
    letter-spacing: 0.03em;
    margin-bottom: 0.3rem;
    text-align: center;
  }

  .login-sub {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 3rem;
    font-style: italic;
    font-family: 'Lora', serif;
    text-align: center;
  }

  .login-card {
    width: 100%;
    max-width: 340px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .who-select {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }

  .who-btn {
    padding: 0.8rem;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .who-btn.selected {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,169,110,0.08);
  }

  .login-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--gold-dim); }
  .login-input::placeholder { color: var(--text-dim); }

  .login-btn {
    background: var(--gold);
    color: #0f0e0c;
    border: none;
    border-radius: 10px;
    padding: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .login-btn:hover { opacity: 0.9; }
  .login-error { color: #e07070; font-size: 0.82rem; text-align: center; min-height: 1.2rem; }

  /* CHAT */
  #chat-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
    animation: fadeIn 0.4s ease;
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 0.7rem; }

  .header-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 600; flex-shrink: 0;
  }

  .header-info { display: flex; flex-direction: column; }
  .header-name { font-family: 'Lora', serif; font-size: 1rem; color: var(--text); line-height: 1.2; }
  .header-status { font-size: 0.72rem; color: var(--text-dim); transition: color 0.3s; }

  .logout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.35rem 0.8rem;
    border-radius: 8px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1rem 0.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    scroll-behavior: smooth;
  }
  .messages-wrap::-webkit-scrollbar { width: 4px; }
  .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .date-divider {
    text-align: center;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin: 0.8rem 0 0.3rem;
    font-style: italic;
    font-family: 'Lora', serif;
  }

  .msg-row {
    display: flex;
    gap: 0.5rem;
    max-width: 80%;
    animation: slideUp 0.25s ease;
  }
  .msg-row.ami { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.her { align-self: flex-start; }

  .msg-bubble {
    padding: 0.65rem 0.9rem;
    border-radius: 16px;
    font-size: 0.92rem;
    line-height: 1.5;
    max-width: 100%;
    word-break: break-word;
  }

  .msg-row.ami .msg-bubble {
    background: var(--bubble-ami);
    border: 1px solid rgba(201,169,110,0.2);
    border-bottom-right-radius: 4px;
  }
  .msg-row.her .msg-bubble {
    background: var(--bubble-her);
    border: 1px solid rgba(160,184,160,0.2);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 0.25rem;
    padding: 0 0.2rem;
    align-self: flex-end;
    white-space: nowrap;
  }
  .msg-row.ami .msg-time { text-align: right; }

  .msg-sender { font-size: 0.7rem; font-weight: 500; margin-bottom: 0.2rem; }
  .msg-row.ami .msg-sender { color: var(--ami); }
  .msg-row.her .msg-sender { color: var(--her); }

  .input-area {
    padding: 0.8rem 1rem;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.6rem;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .msg-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    resize: none;
    max-height: 120px;
    outline: none;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  .msg-input:focus { border-color: var(--gold-dim); }
  .msg-input::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: var(--gold);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
    color: #0f0e0c;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.94); }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    color: var(--text-dim);
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.9rem;
    text-align: center;
    padding: 2rem;
    opacity: 0.6;
  }
  .empty-heart { font-size: 1.8rem; margin-bottom: 0.3rem; }

  .connecting-overlay {
    position: fixed; inset: 0;
    background: rgba(15,14,12,0.85);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem;
    z-index: 100;
    font-family: 'Lora', serif;
    color: var(--text-dim);
    font-style: italic;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-glow"></div>
  <div class="login-title">Our Space</div>
  <div class="login-sub">just the two of us</div>
  <div class="login-card">
    <div class="who-select">
      <button class="who-btn" id="btn-ami" onclick="selectUser('ami')">Ami</button>
      <button class="who-btn" id="btn-her" onclick="selectUser('her')" id="btn-her">Her</button>
    </div>
    <input class="login-input" type="password" id="pass-input" placeholder="Password" onkeydown="if(event.key==='Enter') doLogin()">
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-submit" onclick="doLogin()">Enter</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="header-left">
      <div class="header-avatar" id="other-avatar"></div>
      <div class="header-info">
        <div class="header-name" id="other-name"></div>
        <div class="header-status" id="conn-status">connecting…</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">leave</button>
  </div>
  <div class="messages-wrap" id="messages-wrap">
    <div class="empty-state" id="empty-state">
      <div class="empty-heart">♡</div>
      <div>Your messages will appear here</div>
      <div style="font-size:0.78rem;margin-top:0.5rem;font-family:'DM Sans',sans-serif;font-style:normal">Private • encrypted in transit • just you two</div>
    </div>
  </div>
  <div class="input-area">
    <textarea class="msg-input" id="msg-input" placeholder="Write something…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
// ── Auto-detect server URL ──
const SERVER_HTTP = window.location.origin;
const SERVER_WS = SERVER_HTTP.replace('https://', 'wss://').replace('http://', 'ws://');

let currentUser = null;
let selectedUser = null;
let herName = 'Her';
let ws = null;
let messages = [];

// ── USER SELECT ──
function selectUser(who) {
  selectedUser = who;
  document.getElementById('btn-ami').classList.toggle('selected', who === 'ami');
  document.getElementById('btn-her').classList.toggle('selected', who === 'her');
}

// ── LOGIN ──
async function doLogin() {
  const pass = document.getElementById('pass-input').value;
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-submit');

  if (!selectedUser) { err.textContent = 'Please select who you are'; return; }
  if (!pass) { err.textContent = 'Enter your password'; return; }

  btn.textContent = 'Connecting…';
  btn.disabled = true;
  err.textContent = '';

  try {
    const res = await fetch(`${SERVER_HTTP}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: selectedUser, password: pass })
    });

    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Wrong password'; btn.textContent = 'Enter'; btn.disabled = false; return; }

    herName = data.herName;
    document.getElementById('btn-her').textContent = herName;
    currentUser = selectedUser;
    connectWS(pass);
  } catch(e) {
    err.textContent = 'Cannot reach server. Check connection.';
    btn.textContent = 'Enter';
    btn.disabled = false;
  }
}

// ── WEBSOCKET ──
function connectWS(password) {
  ws = new WebSocket(SERVER_WS);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth', user: currentUser, password }));
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'auth_ok') {
      messages = data.history || [];
      enterChat();
      renderMessages();
    }

    if (data.type === 'auth_fail') {
      document.getElementById('login-error').textContent = 'Auth failed';
      document.getElementById('login-submit').textContent = 'Enter';
      document.getElementById('login-submit').disabled = false;
    }

    if (data.type === 'message') {
      messages.push(data.msg);
      renderMessages();
    }

    if (data.type === 'presence') {
      const name = data.user === 'ami' ? 'Ami' : herName;
      const status = document.getElementById('conn-status');
      status.textContent = data.online ? `${name} is here ♡` : `${name} left`;
      status.style.color = data.online ? '#7ab87a' : 'var(--text-dim)';
    }
  };

  ws.onclose = () => {
    if (currentUser) {
      document.getElementById('conn-status').textContent = 'reconnecting…';
      document.getElementById('conn-status').style.color = 'var(--text-dim)';
      setTimeout(() => connectWS(document.getElementById('pass-input').value), 3000);
    }
  };

  ws.onerror = () => ws.close();
}

// ── ENTER CHAT ──
function enterChat() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  document.getElementById('login-submit').textContent = 'Enter';
  document.getElementById('login-submit').disabled = false;

  const otherName = currentUser === 'ami' ? herName : 'Ami';
  const otherColor = currentUser === 'ami' ? '#a0b8a0' : '#c9a96e';

  document.getElementById('other-name').textContent = otherName;
  document.getElementById('other-avatar').textContent = otherName.charAt(0).toUpperCase();
  document.getElementById('other-avatar').style.background = currentUser === 'ami'
    ? 'rgba(160,184,160,0.15)' : 'rgba(201,169,110,0.15)';
  document.getElementById('other-avatar').style.color = otherColor;
  document.getElementById('conn-status').textContent = 'connected ♡';
  document.getElementById('conn-status').style.color = '#7ab87a';

  document.getElementById('msg-input').focus();
}

function logout() {
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  currentUser = null; selectedUser = null;
  messages = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('pass-input').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('btn-ami').classList.remove('selected');
  document.getElementById('btn-her').classList.remove('selected');
}

// ── SEND ──
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'message', text }));
  input.value = '';
  input.style.height = 'auto';
  input.focus();
}

// ── RENDER ──
function renderMessages() {
  const wrap = document.getElementById('messages-wrap');
  const empty = document.getElementById('empty-state');
  if (messages.length === 0) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  const isAtBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 80;
  wrap.innerHTML = '';

  let lastDate = null;
  messages.forEach(msg => {
    if (msg.date !== lastDate) {
      lastDate = msg.date;
      const d = document.createElement('div');
      d.className = 'date-divider';
      d.textContent = msg.date;
      wrap.appendChild(d);
    }

    const senderLabel = msg.sender === 'ami' ? 'Ami' : herName;
    const row = document.createElement('div');
    row.className = `msg-row ${msg.sender}`;
    row.innerHTML = `
      <div style="display:flex;flex-direction:column;max-width:100%">
        <div class="msg-sender">${senderLabel}</div>
        <div class="msg-bubble">${esc(msg.text)}</div>
        <div class="msg-time">${msg.time}</div>
      </div>`;
    wrap.appendChild(row);
  });

  if (isAtBottom) wrap.scrollTop = wrap.scrollHeight;
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
